<!-- Módulo do formulário de registro -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Missão Evangélica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="auth-container text-center">
        <img src="logo.png" alt="Logotipo" class="logo mb-3" />
        <h2 class="mb-4 fw-bold">Criar Conta</h2>
        <!-- Formulário de registro -->
        <form action="index.html" method="GET">
            
            <div class="mb-3">
                <input type="text" class="form-control custom-input" placeholder="Nome completo" required>
            </div>
            
            <div class="mb-3">
                <input type="email" class="form-control custom-input" placeholder="Endereço de e‑mail" required>
            </div>
            
            <div class="mb-4">
                <input type="password" class="form-control custom-input" placeholder="Criar senha" required>
            </div>
            
            <button type="submit" class="btn btn-light w-100 py-2 fw-bold mb-4">Cadastrar</button>
            
            <p class="text-center text-muted mb-0">
                Já tem conta? <a href="login.html" class="auth-link">Entrar.</a>
            </p>
        </form>
    </div>

</body>
</html>
