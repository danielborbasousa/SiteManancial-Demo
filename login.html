<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Missão Evangélica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="auth-container text-center">
        <img src="logo.png" alt="Logotipo" class="logo mb-3" />
        <h2 class="mb-4 fw-bold">Entrar</h2>
        <form action="index.html" method="GET">
            
            <div class="mb-3">
                <input type="email" class="form-control custom-input" placeholder="Endereço de e‑mail" required>
            </div>
            
            <div class="mb-4">
                <input type="password" class="form-control custom-input" placeholder="Senha" required>
            </div>
            
            <button type="submit" class="btn btn-light w-100 py-2 fw-bold mb-4">Entrar</button>
            
            <p class="text-center text-muted mb-0">
                Novo aqui? <a href="register.html" class="auth-link">Criar conta.</a>
            </p>
        </form>
    </div>

</body>
</html>
